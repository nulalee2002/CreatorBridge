<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria Visual Studio — CreatorBridge</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
body.accent-bold::before {
  background:
    radial-gradient(ellipse 32vmax 24vmax at var(--mx, 50%) var(--my, 40%), rgba(201,168,76,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 60vmax 45vmax at 80% 70%, rgba(201,168,76,0.05) 0%, transparent 55%),
    radial-gradient(ellipse 60vmax 45vmax at 12% 88%, rgba(201,168,76,0.04) 0%, transparent 55%);
}

/* Primary pillar badge — shown once in hero, never duplicated */
.primary-pillar-badge {
  display:inline-flex; align-items:center; gap:0.5rem;
  padding:0.32rem 0.7rem;
  border-radius:7px;
  background:rgba(201,168,76,0.08);
  border:1px solid rgba(201,168,76,0.22);
  font-size:11px;
  line-height:1;
}
.primary-pillar-badge .dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 8px rgba(201,168,76,0.6);
}
.primary-pillar-badge .label {
  font-size:9px; letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--text-dim);
}
.primary-pillar-badge .value {
  font-family:'Playfair Display',serif;
  font-size:12px;
  color:var(--gold);
}

.specialty-chip-profile {
  display:inline-flex; align-items:center;
  padding:0.3rem 0.7rem;
  font-size:11.5px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  letter-spacing:0.01em;
}

/* Service offer card */
.service-offer-card {
  position:relative;
  background:rgba(20,20,24,0.5);
  backdrop-filter:blur(20px) saturate(1.3);
  -webkit-backdrop-filter:blur(20px) saturate(1.3);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.25rem 1.35rem;
  transition: all 0.35s cubic-bezier(0.23,1,0.32,1);
}
.service-offer-card::before {
  content:''; position:absolute; left:0; top:1.25rem; bottom:1.25rem;
  width:2px; border-radius:2px;
  background:linear-gradient(to bottom, var(--gold), transparent);
  opacity:0.45;
}
.service-offer-card:hover {
  border-color:rgba(201,168,76,0.22);
  background:rgba(20,20,24,0.65);
  transform:translateY(-2px);
}
</style>
</head>
<body>

<div id="nav-root"></div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="navGoldGlobal" x1="0" y1="0" x2="40" y2="40">
      <stop stop-color="#c9a84c"/><stop offset="1" stop-color="#a08030"/>
    </linearGradient>
  </defs>
</svg>

<div id="profile-root"></div>

<div id="footer-root"></div>

<script src="core.js"></script>
<script>window.CB.mountChrome('find');</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="profile-app.jsx"></script>

</body>
</html>
