<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CreatorBridge</title>
    <meta name="description" content="CreatorBridge helps US brands source verified media specialists across Video Production, Photography, and Post Production without building an internal media department." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json?v=9" />
    <meta name="theme-color" content="#9C4A33" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512-v9.png?v=9" />
    <link rel="alternate icon" type="image/png" sizes="192x192" href="/icons/icon-192-v9.png?v=9" />

    <!-- Apple / iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CreatorBridge" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-v9.png?v=9" />
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/icons/apple-touch-icon-v9.png?v=9" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            registration.update();
            if (registration.waiting) {
              registration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            registration.addEventListener('updatefound', () => {
              const worker = registration.installing;
              if (!worker) return;
              worker.addEventListener('statechange', () => {
                if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
